<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — Aptigenic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="onboard-page">
    <nav>
        <a href="{{ url_for('welcome') }}" class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Aptigenic" class="logo-img">
        </a>
        <div class="nav-right">
            <a href="{{ url_for('dashboard') }}" class="nav-btn nav-btn-outline">&#8592; Dashboard</a>
            <a href="{{ url_for('chat') }}" class="nav-btn">&#128172; Chat</a>
            <label class="theme-toggle" title="Toggle dark mode">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="toggle-track">
                    <span class="toggle-sun">&#9788;</span>
                    <span class="toggle-moon">&#9790;</span>
                    <span class="toggle-thumb"></span>
                </span>
            </label>
        </div>
    </nav>

    <main class="onboard-container">
        <h1 style="font-size:28px; font-weight:800; margin-bottom:8px;">Edit Your Profile</h1>
        <p style="color:var(--text-muted); margin-bottom:32px;">Update any field below. Changes are saved instantly. Re-analyze from the dashboard to refresh your career map.</p>

        <div class="profile-section">
            <label class="onboard-label">Dream Role / Career Direction</label>
            <input type="text" id="target_role" class="onboard-input" value="{{ user.target_role or '' }}"
                placeholder="e.g., Senior Product Manager, Data Scientist">
        </div>

        <div class="profile-section">
            <label class="onboard-label">Interests &amp; Passions</label>
            <input type="text" id="interests" class="onboard-input" value="{{ user.interests or '' }}"
                placeholder="e.g., writing, problem-solving, working with people">
        </div>

        <div class="profile-section">
            <label class="onboard-label">Timeline</label>
            <div class="option-chips" id="timeline-chips">
                <button class="chip {% if user.timeline == '1-3 months (urgent)' %}selected{% endif %}" data-value="1-3 months (urgent)">1–3 months</button>
                <button class="chip {% if user.timeline == '3-6 months' %}selected{% endif %}" data-value="3-6 months">3–6 months</button>
                <button class="chip {% if user.timeline == '6-12 months' %}selected{% endif %}" data-value="6-12 months">6–12 months</button>
                <button class="chip {% if user.timeline == '1-2 years (long game)' %}selected{% endif %}" data-value="1-2 years (long game)">1–2 years</button>
                <button class="chip {% if user.timeline == 'Just exploring' %}selected{% endif %}" data-value="Just exploring">Just exploring</button>
            </div>
        </div>

        <div class="profile-section">
            <label class="onboard-label">Work Style</label>
            <div class="option-chips" id="work-chips">
                <button class="chip {% if user.work_preference == 'Remote' %}selected{% endif %}" data-value="Remote">Remote</button>
                <button class="chip {% if user.work_preference == 'Hybrid' %}selected{% endif %}" data-value="Hybrid">Hybrid</button>
                <button class="chip {% if user.work_preference == 'In-person' %}selected{% endif %}" data-value="In-person">In-person</button>
                <button class="chip {% if user.work_preference == 'No preference' %}selected{% endif %}" data-value="No preference">No preference</button>
            </div>
        </div>

        <div class="profile-section">
            <label class="onboard-label">Education</label>
            <div class="option-chips" id="education-chips">
                <button class="chip {% if user.education == 'High school' %}selected{% endif %}" data-value="High school">High school</button>
                <button class="chip {% if user.education == 'Some college' %}selected{% endif %}" data-value="Some college">Some college</button>
                <button class="chip {% if user.education == "Bachelor's degree" %}selected{% endif %}" data-value="Bachelor's degree">Bachelor's</button>
                <button class="chip {% if user.education == "Master's degree" %}selected{% endif %}" data-value="Master's degree">Master's</button>
                <button class="chip {% if user.education == 'PhD' %}selected{% endif %}" data-value="PhD">PhD</button>
                <button class="chip {% if user.education == 'Bootcamp / Self-taught' %}selected{% endif %}" data-value="Bootcamp / Self-taught">Bootcamp / Self-taught</button>
            </div>
        </div>

        <div class="profile-section">
            <label class="onboard-label">Resume</label>
            <div class="upload-zone" id="upload-zone">
                <div class="upload-icon">&#128196;</div>
                <p class="upload-label">Upload a new resume (PDF, DOCX, TXT)</p>
                <input type="file" id="resume-file" accept=".pdf,.docx,.doc,.txt" hidden>
            </div>
            <textarea id="resume" class="onboard-textarea" rows="8"
                placeholder="Or paste/edit your resume text here...">{{ user.resume_text or '' }}</textarea>
        </div>

        <div class="profile-actions">
            <div id="save-status" class="save-status"></div>
            <a href="{{ url_for('dashboard') }}" class="btn-primary">&#8592; Back to Dashboard</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='darkmode.js') }}"></script>
    <script src="{{ url_for('static', filename='profile.js') }}"></script>
</body>
</html>
